name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build & verify (unit + driver smoke + Postgres Testcontainer ITs)
        run: mvn -B -ntp verify

      - name: Smoke-check the fat JAR
        run: |
          test -f target/data-bridge.jar
          # Version comes from build-info.properties shaded into the JAR
          # (filtered from pom.xml at build time). Reading it back from the
          # JAR proves three things at once: (1) shade kept the resource,
          # (2) the resource was filtered, (3) BuildInfo loads it correctly.
          EXPECTED_VERSION=$(unzip -p target/data-bridge.jar build-info.properties \
                             | sed -n 's/^version=//p')
          EXPECTED="singularidade-data-bridge ${EXPECTED_VERSION}"
          OUT=$(java -jar target/data-bridge.jar version)
          echo "  expected: $EXPECTED"
          echo "  got:      $OUT"
          if [ "$OUT" != "$EXPECTED" ]; then
              echo "::error::JAR version output mismatch"
              exit 1
          fi

      - name: Upload fat JAR as artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: data-bridge-${{ github.sha }}
          path: target/data-bridge.jar
          retention-days: 14
