name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (must match vX.Y.Z[-suffix], e.g. v0.2.0)'
        required: true
        type: string

permissions:
  contents: write   # required to create the tag and the GitHub Release

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we can tag from HEAD when dispatched

      - name: Resolve release tag
        id: tag
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
          PUSHED_TAG: ${{ github.ref_name }}
          EVENT: ${{ github.event_name }}
        run: |
          if [ "$EVENT" = "workflow_dispatch" ]; then
            TAG="$DISPATCH_VERSION"
          else
            TAG="$PUSHED_TAG"
          fi
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$ ]]; then
            echo "::error::tag '$TAG' does not match vMAJOR.MINOR.PATCH[-suffix]"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG (event: $EVENT)"

      - name: Create and push tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          if git rev-parse --verify "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::tag ${TAG} already exists locally"
            exit 1
          fi
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "refs/tags/$TAG"

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build & verify (full test suite must pass before release)
        run: mvn -B -ntp verify

      - name: Smoke-check the fat JAR
        run: |
          test -f target/data-bridge.jar
          java -jar target/data-bridge.jar version

      - name: Stage release artifacts
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          mkdir -p release
          cp target/data-bridge.jar "release/data-bridge-${TAG}.jar"
          ( cd release && sha256sum "data-bridge-${TAG}.jar" > "data-bridge-${TAG}.jar.sha256" )
          ls -la release/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            "release/data-bridge-${TAG}.jar" \
            "release/data-bridge-${TAG}.jar.sha256"
